name: Deploy Constellation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LINODE_SSH_KEY }}

      - name: Add Linode to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.LINODE_PORT }}" -H "${{ secrets.LINODE_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy control scripts
        run: |
          rsync -az \
            -e "ssh -p ${{ secrets.LINODE_PORT }}" \
            Deploy_Servers/server-05-ci-cd/pipelines/deploy/ \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:/tmp/constellation-deploy/"

      - name: Run remote bootstrap check
        run: |
          ssh -p "${{ secrets.LINODE_PORT }}" \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" \
            'bash /tmp/constellation-deploy/bootstrap-check.sh'

      - name: Upload constellation payload
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.LINODE_PORT }}" \
            Deploy_Servers/ \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:/opt/africamapping/Deploy_Servers/"

      - name: Run remote deployment heartbeat
        run: |
          ssh -p "${{ secrets.LINODE_PORT }}" \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" \
            'bash /opt/africamapping/Deploy_Servers/server-05-ci-cd/pipelines/deploy/deploy-constellation.sh'

      - name: Show remote heartbeat state
        run: |
          ssh -p "${{ secrets.LINODE_PORT }}" \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" \
            'cat /opt/africamapping/deployment-state/constellation-status.json'

      - name: Show remote deploy log
        run: |
          ssh -p "${{ secrets.LINODE_PORT }}" \
            "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" \
            'sudo cat /var/log/africamapping/deploy.log || true'
