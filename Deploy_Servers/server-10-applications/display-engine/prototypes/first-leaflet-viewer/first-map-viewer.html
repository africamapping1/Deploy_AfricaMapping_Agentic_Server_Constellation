<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AfricaMapping First Map Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      background: #f8f8f8;
    }

    #header h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
    }

    #header p {
      margin: 0;
      font-size: 14px;
      color: #555;
    }

    #status {
      padding: 8px 16px;
      font-size: 13px;
      background: #fffbe6;
      border-bottom: 1px solid #eee;
    }

    #map {
      flex: 1;
      min-height: 400px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>AfricaMapping First Map Viewer</h1>
      <p>Loads the first generated GeoJSON polygon and displays it on a Leaflet map.</p>
    </div>

    <div id="status">Loading GeoJSON...</div>
    <div id="map"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const statusEl = document.getElementById("status");

    const map = L.map("map").setView([9.0225, 38.7470], 16);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    // Update this path depending on where you serve the GeoJSON from.
    // For local simple testing, place the GeoJSON next to this HTML file or
    // adjust the URL to your server path.
    const geoJsonUrl = "http://69.164.203.60:8000/africamapping-first-polygon.geojson";    


    fetch(geoJsonUrl)
      .then((response) => {
        if (!response.ok) {
          throw new Error(`Failed to load GeoJSON: ${response.status}`);
        }
        return response.json();
      })
      .then((data) => {
        const layer = L.geoJSON(data, {
          onEachFeature: (feature, layer) => {
            const props = feature.properties || {};
            layer.bindPopup(`
              <strong>ID:</strong> ${props.id || "n/a"}<br>
              <strong>Tenant:</strong> ${props.tenant || "n/a"}<br>
              <strong>Layer:</strong> ${props.layer || "n/a"}<br>
              <strong>Status:</strong> ${props.status || "n/a"}
            `);
          }
        }).addTo(map);

        map.fitBounds(layer.getBounds(), { padding: [20, 20] });
        statusEl.textContent = "GeoJSON loaded successfully.";
      })
      .catch((error) => {
        console.error(error);
        statusEl.textContent = `Error: ${error.message}`;
      });
  </script>
</body>
</html>
