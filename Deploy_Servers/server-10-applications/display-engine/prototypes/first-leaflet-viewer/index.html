<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AfricaMapping First Leaflet Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      background: #f8f8f8;
    }

    #header h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
    }

    #header p {
      margin: 0;
      font-size: 14px;
      color: #555;
    }

    #status {
      padding: 8px 16px;
      font-size: 13px;
      background: #fffbe6;
      border-bottom: 1px solid #eee;
    }

    #main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #layerPanel {
      width: 220px;
      border-right: 1px solid #ddd;
      padding: 10px;
      background: #fafafa;
      box-sizing: border-box;
    }

    #layerPanel select {
      width: 100%;
      margin: 6px 0 16px 0;
      padding: 6px;
    }

    #mapWrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #map {
      flex: 1;
      min-height: 400px;
    }

    #statusBar {
      display: flex;
      gap: 16px;
      padding: 8px 12px;
      font-size: 12px;
      border-top: 1px solid #ddd;
      background: #f7f7f7;
      color: #333;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>AfricaMapping First Leaflet Viewer</h1>
      <p>Prototype viewer for the reusable display engine.</p>
    </div>

    <div id="status">Loading viewer...</div>

    <div id="main">
      <div id="layerPanel">
        <strong>Display Controls</strong><br><br>

        <label for="basemapSelect"><strong>Basemap</strong></label><br>
        <select id="basemapSelect">
          <option value="osm">OpenStreetMap</option>
          <option value="carto-light">Carto Light</option>
        </select>

        <label>
          <input type="checkbox" id="layerToggle" checked />
          Polygon Layer
        </label>
      </div>

      <div id="mapWrap">
        <div id="map"></div>

        <div id="statusBar">
          <div><strong>Coords:</strong> <span id="coordReadout">--, --</span></div>
          <div><strong>Basemap:</strong> <span id="basemapReadout">--</span></div>
          <div><strong>Layer:</strong> <span id="layerReadout">--</span></div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="./viewer.js"></script>
</body>
</html>
