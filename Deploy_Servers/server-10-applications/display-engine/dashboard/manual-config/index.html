<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Display Engine Manual Config Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .wrap {
      max-width: 900px;
      margin: 24px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 600;
      font-size: 14px;
    }

    input, select {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      background: #222;
      color: white;
    }

    button.secondary {
      background: #eee;
      color: #222;
    }

    .note {
      margin-top: 20px;
      font-size: 13px;
      color: #666;
      background: #faf7e8;
      border: 1px solid #eee2a8;
      padding: 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Display Engine Manual Config Dashboard</h1>
    <p>Select a reusable display profile and open the viewer.</p>

    <div class="grid">
      <div class="field full">
        <label for="profile">Select Profile</label>
        <select id="profile">
           <option value="../../profiles/africamapping-basic.json">
             africamapping-basic
           </option>
           <option value="../../profiles/africamapping-light.json">
             africamapping-light
           </option>
           <option value="../../profiles/africamapping-review.json">
             africamapping-review
           </option>
         </select>
      </div>

      <div class="field full">
        <label for="viewerUrl">Viewer URL</label>
        <input id="viewerUrl" type="text" value="../../prototypes/first-leaflet-viewer/index.html" />
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="openViewer">Open Viewer With Profile</button>
      <button class="secondary" id="resetDefaults">Reset Defaults</button>
    </div>

    <div class="note">
      This version uses reusable profile files instead of many manual URL parameters.
    </div>
  </div>

  <script>
    const defaults = {
      profile: "../../profiles/africamapping-basic.json",
      viewerUrl: "../../prototypes/first-leaflet-viewer/index.html"
    };

    function setValue(id, value) {
      document.getElementById(id).value = value;
    }

    document.getElementById("openViewer").addEventListener("click", () => {
      const params = new URLSearchParams({
        profile: document.getElementById("profile").value
      });

      const viewerUrl = document.getElementById("viewerUrl").value;
      window.open(`${viewerUrl}?${params.toString()}`, "_blank");
    });

    document.getElementById("resetDefaults").addEventListener("click", () => {
      Object.entries(defaults).forEach(([key, value]) => setValue(key, value));
    });
  </script>
</body>
</html>
